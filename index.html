<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>病理学题库</title>
<style>
:root {
    --primary: #1a5276; --primary-light: #2980b9;
    --accent: #16a085; --danger: #e74c3c; --warning: #f39c12;
    --bg: #f0f2f5; --card: #fff; --text: #2c3e50; --text-light: #7f8c8d;
    --border: #e1e8ed; --shadow: 0 2px 12px rgba(0,0,0,.08); --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px;
}
.top-nav { position:sticky; top:0; z-index:100; background:var(--primary); color:#fff; padding:12px 16px; display:flex; align-items:center; gap:10px; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.top-nav h1 { font-size:1.1em; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.top-nav button { background:rgba(255,255,255,.15); border:none; color:#fff; padding:7px 12px; border-radius:18px; font-size:.8em; cursor:pointer; transition:.2s; white-space:nowrap; }
.top-nav button:hover { background:rgba(255,255,255,.25); }
.top-nav button.active { background:var(--accent); }

/* Home page - chapter grid */
.home { padding:12px; max-width:900px; margin:0 auto; }
.home-header { text-align:center; padding:24px 12px 12px; }
.home-header h2 { font-size:1.3em; color:var(--primary); margin-bottom:4px; }
.home-header p { font-size:.85em; color:var(--text-light); }
.stats-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 12px 16px; }
.stat-card { background:var(--card); border-radius:10px; padding:12px 16px; text-align:center; min-width:70px; box-shadow:var(--shadow); }
.stat-card .num { font-size:1.4em; font-weight:700; color:var(--primary); }
.stat-card .lbl { font-size:.7em; color:var(--text-light); margin-top:2px; }

.type-tabs { display:flex; gap:6px; padding:0 12px 12px; justify-content:center; flex-wrap:wrap; }
.type-tab { padding:8px 18px; border-radius:20px; font-size:.85em; border:1.5px solid var(--border); background:#fff; cursor:pointer; transition:.2s; }
.type-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }

.ch-grid { display:flex; flex-direction:column; gap:10px; }
.ch-card { background:var(--card); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:12px; border-left:4px solid transparent; }
.ch-card:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,.12); }
.ch-card:active { transform:scale(.98); }
.ch-card .ch-icon { font-size:1.6em; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:12px; flex-shrink:0; }
.ch-card .ch-info { flex:1; min-width:0; }
.ch-card .ch-name { font-size:.95em; font-weight:600; margin-bottom:2px; }
.ch-card .ch-meta { font-size:.75em; color:var(--text-light); }
.ch-card .ch-arrow { color:var(--text-light); font-size:1.1em; }
.ch-card:nth-child(1) .ch-icon { background:#e8f0fe; } .ch-card:nth-child(1) { border-left-color:#3498db; }
.ch-card:nth-child(2) .ch-icon { background:#eaf2f8; } .ch-card:nth-child(2) { border-left-color:#2980b9; }
.ch-card:nth-child(3) .ch-icon { background:#fdebd0; } .ch-card:nth-child(3) { border-left-color:#e67e22; }
.ch-card:nth-child(4) .ch-icon { background:#fdedec; } .ch-card:nth-child(4) { border-left-color:#e74c3c; }
.ch-card:nth-child(5) .ch-icon { background:#e8f8f5; } .ch-card:nth-child(5) { border-left-color:#1abc9c; }
.ch-card:nth-child(6) .ch-icon { background:#f4ecf7; } .ch-card:nth-child(6) { border-left-color:#8e44ad; }
.ch-card:nth-child(7) .ch-icon { background:#fef9e7; } .ch-card:nth-child(7) { border-left-color:#f1c40f; }
.ch-card:nth-child(8) .ch-icon { background:#ebf5fb; } .ch-card:nth-child(8) { border-left-color:#5dade2; }
.ch-card:nth-child(9) .ch-icon { background:#fdf2e9; } .ch-card:nth-child(9) { border-left-color:#dc7633; }
.ch-card:nth-child(10) .ch-icon { background:#eafaf1; } .ch-card:nth-child(10) { border-left-color:#27ae60; }
.ch-card:nth-child(11) .ch-icon { background:#f9ebea; } .ch-card:nth-child(11) { border-left-color:#c0392b; }
.ch-card:nth-child(12) .ch-icon { background:#e8daef; } .ch-card:nth-child(12) { border-left-color:#7d3c98; }
.ch-card:nth-child(13) .ch-icon { background:#d5f5e3; } .ch-card:nth-child(13) { border-left-color:#17a589; }

/* Study view */
.study-view { display:none; padding:12px; max-width:800px; margin:0 auto; }
.study-view.active { display:block; }
.toolbar { display:flex; gap:6px; padding:8px 0; flex-wrap:wrap; align-items:center; }
.toolbar input { flex:1; min-width:120px; padding:8px 12px 8px 32px; border:1px solid var(--border); border-radius:20px; font-size:.9em; background:var(--bg); outline:none; }
.toolbar input:focus { border-color:var(--primary-light); }
.search-w { position:relative; flex:1; min-width:120px; }
.search-w span { position:absolute; left:10px; top:50%; transform:translateY(-50%); }
.progress-text { font-size:.8em; color:var(--text-light); white-space:nowrap; }

.card { background:var(--card); border-radius:var(--radius); padding:20px; margin-bottom:12px; box-shadow:var(--shadow); }
.card-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.badge { font-size:.72em; padding:3px 9px; border-radius:10px; font-weight:600; }
.b-num { background:#e8f0fe; color:var(--primary-light); } .b-type { background:#e8f8f5; color:var(--accent); }
.b-done { background:#eafaf1; color:#27ae60; }
.stem { font-size:1.05em; line-height:1.8; margin-bottom:14px; }
.options { list-style:none; display:flex; flex-direction:column; gap:7px; }
.opt { padding:11px 12px; border:2px solid var(--border); border-radius:8px; cursor:pointer; display:flex; align-items:flex-start; gap:9px; font-size:.93em; line-height:1.5; transition:all .15s; -webkit-tap-highlight-color:transparent; }
.opt:active { transform:scale(.98); }
.opt.sel { border-color:var(--primary-light); background:#e8f0fe; }
.opt.correct { border-color:var(--accent); background:#e8f8f5; }
.opt.wrong { border-color:var(--danger); background:#fdedec; }
.ol { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.8em; flex-shrink:0; }
.oa .ol { background:#ebf5fb; color:#3498db; } .ob .ol { background:#fdf2e9; color:#e67e22; }
.oc .ol { background:#eafaf1; color:#27ae60; } .od .ol { background:#f4ecf7; color:#8e44ad; }
.oe .ol { background:#fdedec; color:#e74c3c; }

.act-bar { margin-top:14px; padding-top:12px; border-top:1px solid var(--border); display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.btn { padding:7px 14px; border-radius:18px; border:1px solid var(--border); background:#fff; font-size:.82em; cursor:pointer; display:flex; align-items:center; gap:4px; transition:.2s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
.btn:active { transform:scale(.95); }
.btn-a { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn-bm { border-color:var(--warning); color:#b7950b; } .btn-bm.on { background:#fef9e7; }
.btn-done { border-color:var(--primary-light); color:var(--primary-light); } .btn-done.on { background:#e8f0fe; }

.ans-box { display:none; margin-top:12px; padding:14px; border-radius:8px; font-size:.9em; line-height:1.7; }
.ans-box.show { display:block; }
.ans-choice { background:#eafaf1; border-left:4px solid var(--accent); }
.ans-term { background:#f8f9fa; }
.ans-sa { background:#fef9e7; border-left:4px solid var(--warning); }
.ans-label { font-weight:700; color:var(--accent); margin-bottom:4px; }

.term-name { font-size:1.1em; font-weight:600; color:var(--primary); margin-bottom:2px; }
.term-en { font-size:.82em; color:var(--text-light); font-style:italic; margin-bottom:10px; }
.sa-q { font-size:1.05em; line-height:1.7; margin-bottom:10px; }

.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; z-index:100; box-shadow:0 -2px 8px rgba(0,0,0,.08); }
.bottom-nav button { flex:1; padding:10px 6px; border:none; background:transparent; font-size:.78em; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--text-light); }
.bottom-nav button:active { color:var(--primary-light); }
.bottom-nav .ni { font-size:1.2em; }

.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; }
.overlay.show { display:block; }

.toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:#2c3e50; color:#fff; padding:8px 20px; border-radius:20px; font-size:.82em; z-index:300; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.empty { text-align:center; padding:60px 20px; color:var(--text-light); }
.empty .icon { font-size:3em; margin-bottom:12px; }

@media(min-width:768px) {
    .ch-grid { display:grid; grid-template-columns:repeat(2,1fr); }
    .home { padding:20px; }
    .study-view { padding:20px; }
    .card { padding:28px; }
}
</style>
</head>
<body>
<div class="top-nav">
    <h1 id="topTitle">📚 病理学题库</h1>
    <button id="btnBmFilter" onclick="toggleBmFilter()" style="display:none">⭐ 收藏</button>
    <button id="btnRandom" onclick="randomQ()" style="display:none">🎲 随机</button>
    <button onclick="goHome()">🏠 目录</button>
</div>

<!-- ── Home View ── -->
<div class="home" id="homeView">
    <div class="home-header">
        <h2>病理学题库</h2>
        <p>Pathology Question Bank</p>
    </div>
    <div class="stats-row" id="homeStats"></div>
    <div class="type-tabs" id="typeTabs"></div>
    <div class="ch-grid" id="chGrid"></div>
</div>

<!-- ── Study View ── -->
<div class="study-view" id="studyView">
    <div class="toolbar">
        <div class="search-w"><span>🔍</span><input type="text" id="searchIn" placeholder="搜索..." oninput="onSearch()"></div>
        <span class="progress-text" id="progress"></span>
    </div>
    <div id="studyContent"></div>
</div>

<div class="bottom-nav" id="bottomNav" style="display:none">
    <button onclick="prevQ()"><span class="ni">◀</span>上一题</button>
    <button onclick="toggleAns()"><span class="ni">💡</span>显示答案</button>
    <button onclick="toggleBm()"><span class="ni" id="bmIcon">☆</span>收藏</button>
    <button onclick="nextQ()"><span class="ni">▶</span>下一题</button>
</div>

<div class="toast" id="toast"></div>

<script>
let data = {single_choice:[], terminology:[], short_answer:[]};
let cType = 'single_choice';
let cChapter = ''; let cIdx = 0;
let bookmarks = new Set(); let doneItems = new Set(); let bmFilter = false; let searchQ = '';

const CH_ICONS = ['🔬','🩹','🩸','🔥','🎗️','❤️','🫁','🍽️','🦠','🛡️','🫘','👶','🦋'];
const CH_ORDER = [
    "第1章 细胞和组织的适应与损伤","第2章 损伤的修复","第3章 局部血液循环障碍",
    "第4章 炎症","第5章 肿瘤","第6章 心血管系统疾病","第7章 呼吸系统疾病",
    "第8章 消化系统疾病","第9章 淋巴造血系统疾病","第10章 免疫性疾病",
    "第11章 泌尿系统疾病","第12章 生殖系统和乳腺疾病","第13章 内分泌系统疾病"
];

try {
    bookmarks = new Set(JSON.parse(localStorage.getItem('pb_bm')||'[]'));
    doneItems = new Set(JSON.parse(localStorage.getItem('pb_done')||'[]'));
} catch(e) {}

function save(k,v) { localStorage.setItem(k, JSON.stringify([...v])); }
function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function toast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
// Base64 decode for encrypted JSON data
function d64(s) { if(!s||s.length<4) return s||''; try { return atob(s); } catch(e) { return s; } }
function dec(q, field) { return d64(q[field]||''); }

async function init() {
    try { const r=await fetch('questions.json'); data=await r.json(); } catch(e) { document.getElementById('homeView').innerHTML=`<div class="empty"><div class="icon">⚠️</div><h3>加载失败</h3><p>${e.message}</p></div>`; return; }
    buildHome();
}

function buildHome() {
    // Stats
    const sc = data.single_choice?.length||0, tc = data.terminology?.length||0, sc2 = data.short_answer?.length||0;
    document.getElementById('homeStats').innerHTML = `<div class="stat-card"><div class="num">${sc+tc+sc2}</div><div class="lbl">总题量</div></div><div class="stat-card"><div class="num">${sc}</div><div class="lbl">选择题</div></div><div class="stat-card"><div class="num">${tc}</div><div class="lbl">名词解释</div></div><div class="stat-card"><div class="num">${sc2}</div><div class="lbl">简答题</div></div><div class="stat-card"><div class="num">${bookmarks.size}</div><div class="lbl">已收藏</div></div>`;

    // Type tabs
    document.getElementById('typeTabs').innerHTML = `
        <button class="type-tab ${cType==='single_choice'?'active':''}" onclick="switchType('single_choice',this)">📝 选择题</button>
        <button class="type-tab ${cType==='terminology'?'active':''}" onclick="switchType('terminology',this)">📖 名词解释</button>
        <button class="type-tab ${cType==='short_answer'?'active':''}" onclick="switchType('short_answer',this)">✍️ 简答题</button>
    `;
    buildChGrid();
}

function buildChGrid() {
    const items = data[cType]||[];
    const grid = document.getElementById('chGrid');
    grid.innerHTML = CH_ORDER.map((ch,i) => {
        const chItems = items.filter(q => q.chapter === ch);
        if (chItems.length === 0) return '';
        return `<div class="ch-card" onclick="openChapter('${esc(ch)}')">
            <div class="ch-icon">${CH_ICONS[i]||'📄'}</div>
            <div class="ch-info">
                <div class="ch-name">${ch}</div>
                <div class="ch-meta">${chItems.length} 题</div>
            </div>
            <div class="ch-arrow">›</div>
        </div>`;
    }).join('');
}

function switchType(type, btn) {
    cType = type; cChapter = ''; cIdx = 0;
    document.querySelectorAll('.type-tab').forEach(b=>b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    buildChGrid();
}

function openChapter(ch) {
    cChapter = ch; cIdx = 0; searchQ = ''; bmFilter = false;
    document.getElementById('searchIn').value = '';
    document.getElementById('homeView').style.display = 'none';
    document.getElementById('studyView').classList.add('active');
    document.getElementById('bottomNav').style.display = 'flex';
    document.getElementById('btnBmFilter').style.display = '';
    document.getElementById('btnRandom').style.display = '';
    document.getElementById('topTitle').textContent = ch;
    updateBmBtn();
    renderQ();
}

function goHome() {
    document.getElementById('homeView').style.display = '';
    document.getElementById('studyView').classList.remove('active');
    document.getElementById('bottomNav').style.display = 'none';
    document.getElementById('btnBmFilter').style.display = 'none';
    document.getElementById('btnRandom').style.display = 'none';
    document.getElementById('topTitle').textContent = '📚 病理学题库';
    buildChGrid();
}

function getItems() {
    let items = (data[cType]||[]).filter(q => q.chapter === cChapter);
    if (bmFilter) items = items.filter(q => bookmarks.has(`${cType}|${q.chapter}|${q.number}`));
    if (searchQ) { const s=searchQ.toLowerCase(); items=items.filter(q=>{ const all=[dec(q,'stem'),dec(q,'term'),dec(q,'question'),dec(q,'option_a'),dec(q,'option_b'),dec(q,'option_c'),dec(q,'option_d'),dec(q,'option_e'),dec(q,'answer'),dec(q,'definition'),dec(q,'english'),dec(q,'explanation')].join(' ').toLowerCase(); return all.includes(s); }); }
    return items;
}

function renderQ() {
    const items = getItems();
    if (!items.length) {
        document.getElementById('studyContent').innerHTML = `<div class="empty"><div class="icon">📭</div><h3>暂无内容</h3></div>`;
        document.getElementById('progress').textContent = '0/0';
        return;
    }
    if (cIdx >= items.length) cIdx = 0;
    if (cIdx < 0) cIdx = items.length - 1;
    const q = items[cIdx], key = `${cType}|${q.chapter}|${q.number}`;
    const isBm = bookmarks.has(key), isDone = doneItems.has(key);
    document.getElementById('progress').textContent = `${cIdx+1}/${items.length}`;
    document.getElementById('bmIcon').textContent = isBm?'⭐':'☆';

    let html = '';
    if (cType === 'single_choice') {
        const st = dec(q,'stem'), oa = dec(q,'option_a'), ob = dec(q,'option_b'), oc = dec(q,'option_c'), od = dec(q,'option_d'), oe = dec(q,'option_e');
        const ansRaw = dec(q,'answer'), expl = dec(q,'explanation');
        const opts = [{l:'A',t:oa},{l:'B',t:ob},{l:'C',t:oc},{l:'D',t:od},{l:'E',t:oe}].filter(o=>o.t&&o.t.length>1);
        const ansText = opts.find(o=>o.l===ansRaw);
        html = `<div class="card">
            <div class="card-header"><span class="badge b-num">第${q.number}题</span><span class="badge b-type">单选题</span>${isDone?'<span class="badge b-done">✅</span>':''}</div>
            <div class="stem">${esc(st)}</div>
            <ul class="options">${opts.map(o=>`<li class="opt o${o.l.toLowerCase()}" id="opt${o.l}" onclick="selOpt('${o.l}')"><span class="ol">${o.l}</span><span>${esc(o.t)}</span></li>`).join('')}</ul>
            <div class="act-bar">
                <button class="btn btn-a" onclick="toggleAns()" id="ansBtn">💡 显示答案</button>
                <button class="btn btn-bm ${isBm?'on':''}" onclick="toggleBm()">${isBm?'⭐':'☆'} 收藏</button>
                <button class="btn btn-done ${isDone?'on':''}" onclick="toggleDone()">${isDone?'✅':'☐'} 完成</button>
            </div>
            <div class="ans-box ans-choice" id="ansBox">
                <div class="ans-label">✅ 正确答案：<strong>${esc(ansRaw||'?')}</strong>${ansText?' — '+esc(ansText.t):''}</div>
                <div style="margin-top:8px;color:#555">${esc(expl)}</div>
            </div>
        </div>`;
    } else if (cType === 'terminology') {
        const tm = dec(q,'term'), en = dec(q,'english'), defn = dec(q,'definition');
        html = `<div class="card">
            <div class="card-header"><span class="badge b-num">第${q.number}题</span><span class="badge b-type">名词解释</span>${isDone?'<span class="badge b-done">✅</span>':''}</div>
            <div class="term-name">${esc(tm)}</div>
            <div class="term-en">${esc(en)}</div>
            <div class="act-bar">
                <button class="btn btn-a" onclick="toggleAns()">💡 显示释义</button>
                <button class="btn btn-bm ${isBm?'on':''}" onclick="toggleBm()">${isBm?'⭐':'☆'} 收藏</button>
                <button class="btn btn-done ${isDone?'on':''}" onclick="toggleDone()">${isDone?'✅':'☐'} 完成</button>
            </div>
            <div class="ans-box ans-term" id="ansBox">${esc(defn||'暂无释义，请参考教材。')}</div>
        </div>`;
    } else {
        const sq = dec(q,'question'), sa = dec(q,'answer');
        html = `<div class="card">
            <div class="card-header"><span class="badge b-num">第${q.number}题</span><span class="badge b-type">简答题</span>${isDone?'<span class="badge b-done">✅</span>':''}</div>
            <div class="sa-q">${esc(sq)}</div>
            <div class="act-bar">
                <button class="btn btn-a" onclick="toggleAns()">💡 显示参考答案</button>
                <button class="btn btn-bm ${isBm?'on':''}" onclick="toggleBm()">${isBm?'⭐':'☆'} 收藏</button>
                <button class="btn btn-done ${isDone?'on':''}" onclick="toggleDone()">${isDone?'✅':'☐'} 完成</button>
            </div>
            <div class="ans-box ans-sa" id="ansBox">${esc(sa||'暂无参考答案，请参考教材。')}</div>
        </div>`;
    }
    document.getElementById('studyContent').innerHTML = html;
    window.scrollTo({top:0,behavior:'smooth'});
}

function selOpt(l) { document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel')); const e=document.getElementById('opt'+l); if(e)e.classList.add('sel'); }
function toggleAns() { const b=document.getElementById('ansBox'), btn=document.getElementById('ansBtn'); if(!b)return; const show=!b.classList.contains('show'); b.classList.toggle('show'); if(btn)btn.textContent=show?'🔄 隐藏':'💡 显示答案';
    if(show&&cType==='single_choice'){const items=getItems(),q=items[cIdx];const a=d64(q.answer||'');if(a){const co=document.getElementById('opt'+a);if(co)co.classList.add('correct');const sel=document.querySelector('.opt.sel');if(sel&&!sel.classList.contains('correct'))sel.classList.add('wrong');}}
    if(!show&&cType==='single_choice'){document.querySelectorAll('.opt').forEach(o=>o.classList.remove('correct','wrong'));} }
function toggleBm() { const items=getItems(); if(!items.length)return; const q=items[cIdx],key=`${cType}|${q.chapter}|${q.number}`; if(bookmarks.has(key)){bookmarks.delete(key);toast('已取消收藏');}else{bookmarks.add(key);toast('已收藏⭐');} save('pb_bm',bookmarks); renderQ(); }
function toggleDone() { const items=getItems(); if(!items.length)return; const q=items[cIdx],key=`${cType}|${q.chapter}|${q.number}`; if(doneItems.has(key)){doneItems.delete(key);toast('已取消完成');}else{doneItems.add(key);toast('已完成✅');} save('pb_done',doneItems); renderQ(); }
function toggleBmFilter() { bmFilter=!bmFilter; cIdx=0; updateBmBtn(); renderQ(); }
function updateBmBtn() { const b=document.getElementById('btnBmFilter'); if(b)b.classList.toggle('active',bmFilter); }
function onSearch() { searchQ=document.getElementById('searchIn').value; cIdx=0; renderQ(); }
function prevQ() { const items=getItems(); if(cIdx>0){cIdx--;renderQ();window.scrollTo({top:0,behavior:'smooth'});} }
function nextQ() { const items=getItems(); if(cIdx<items.length-1){cIdx++;renderQ();window.scrollTo({top:0,behavior:'smooth'});} }
function randomQ() { let pool=(data[cType]||[]).filter(q=>bmFilter?bookmarks.has(`${cType}|${q.chapter}|${q.number}`):true); if(!pool.length){toast('暂无题目');return;} const r=pool[Math.floor(Math.random()*pool.length)]; cChapter=r.chapter; document.getElementById('topTitle').textContent=cChapter; cIdx=getItems().findIndex(q=>q.number===r.number); if(cIdx<0)cIdx=0; if(document.getElementById('homeView').style.display!=='none'){document.getElementById('homeView').style.display='none';document.getElementById('studyView').classList.add('active');document.getElementById('bottomNav').style.display='flex';document.getElementById('btnBmFilter').style.display='';document.getElementById('btnRandom').style.display='';} renderQ(); }

document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    switch(e.key){ case'ArrowRight':case'j':nextQ();break; case'ArrowLeft':case'k':prevQ();break; case' ':e.preventDefault();toggleAns();break; case'b':toggleBm();break; case'r':randomQ();break; case'1':case'2':case'3':case'4':case'5':selOpt(String.fromCharCode(64+parseInt(e.key)));break; case'Escape':goHome();break; }
});

init();
</script>
</body>
</html>
